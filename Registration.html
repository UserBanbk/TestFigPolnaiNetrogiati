<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пустой сайт</title>
    <link rel="stylesheet" href="Effective.css">
</head>
<body>
    <div class="rectangle">
        <div class="square" id="square"></div>
    </div>
    <script>
        const square = document.getElementById('square');
        const body = document.body;
        const rect = document.querySelector('.rectangle');

        square.addEventListener('click', function() {
            if (!this.classList.contains('animate')) {
                this.classList.add('animate');
            }
        });

        square.addEventListener('animationend', function() {
            body.style.backgroundColor = '#9dac86';
            rect.style.backgroundColor = '#809164';
            this.style.backgroundColor = '#ced5c3';
            this.classList.remove('animate'); 
        });
    </script>
</body>
</html>
