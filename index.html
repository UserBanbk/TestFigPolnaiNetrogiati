<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пустой сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rectangle">
        <div class="square" id="toggleBtn"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('toggleBtn');
            const body = document.body;
            let isAnimating = false;

            btn.addEventListener('click', function() {
                if (isAnimating) return;
                isAnimating = true;

                const startLeft = btn.offsetLeft;
                const rectWidth = btn.parentElement.offsetWidth;
                const btnWidth = btn.offsetWidth;
                const endLeft = body.classList.contains('light') ? 8 : rectWidth - 8 - btnWidth;
                const startColor = body.classList.contains('light') ? '#ced5c3' : '#202419';
                const endColor = body.classList.contains('light') ? '#202419' : '#ced5c3';
                const duration = window.innerWidth <= 768 ? 3000 : 2000;
                const startTime = performance.now();

                function animate(time) {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    const currentLeft = startLeft + (endLeft - startLeft) * ease;
                    btn.style.left = currentLeft + 'px';
                    const r = parseInt(startColor.slice(1,3), 16) + (parseInt(endColor.slice(1,3), 16) - parseInt(startColor.slice(1,3), 16)) * ease;
                    const g = parseInt(startColor.slice(3,5), 16) + (parseInt(endColor.slice(3,5), 16) - parseInt(startColor.slice(3,5), 16)) * ease;
                    const b = parseInt(startColor.slice(5,7), 16) + (parseInt(endColor.slice(5,7), 16) - parseInt(startColor.slice(5,7), 16)) * ease;
                    btn.style.backgroundColor = `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        btn.style.left = endLeft + 'px';
                        btn.style.backgroundColor = endColor;
                        body.classList.toggle('light');
                        isAnimating = false;
                    }
                }
                requestAnimationFrame(animate);
            });
        });
    </script>
</body>
</html>
