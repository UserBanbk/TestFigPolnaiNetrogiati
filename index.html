<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .rectangle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 250px;
            height: 60px;
            background-color: #535e40;
            border-radius: 14px;
            border-top: 2px solid #202419;
        }
        @media (max-width: 600px) {
            .rectangle {
                top: 4px;
                right: 4px;
                width: 110px;
                height: 30px;
                border-radius: 8px;
                border-top: 1px solid #202419;
            }
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#23271b; min-height:100vh;">
    <div class="rectangle"></div>
</body>
</html>
