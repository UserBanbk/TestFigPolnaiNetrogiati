<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пустой сайт</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #23271b;
        }
        .rectangle {
            position: fixed;
            top: 25px;
            right: 25px;
            background-color: #535e40;
            border-radius: 20px;
            border: 1px solid #202419;
            /* базовые размеры для ПК (широкий) */
            width: 260px;
            height: 85px;
        }

        /* оптимизация для телефонов (экраны до 768px) */
        @media (max-width: 768px) {
            .rectangle {
                top: 15px;
                right: 15px;
                width: 140px;   /* меньше, чтобы не казался огромным */
                height: 55px;
                border-radius: 14px;
                border-width: 1px;
            }
        }

        /* для очень маленьких телефонов (до 480px) — ещё мельче */
        @media (max-width: 480px) {
            .rectangle {
                width: 110px;
                height: 45px;
                top: 10px;
                right: 10px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="rectangle"></div>
</body>
</html>
