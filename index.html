<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Всплывающее уведомление -->
    <div id="notificationToast" class="notification-toast">
        <div class="notif-content"><p id="notifMessage">Текст уведомления</p></div>
    </div>

    <div class="app-container">
        <!-- Шапка с логотипом (Видна только на экране входа) -->
        <div id="headerSection" class="header-section">
            <img src="BankLogo.png" alt="Bank Logo" class="logo">
            <h1 class="greeting-title">Добро Пожаловать в<br>Международный<br>Крипта Банк</h1>
        </div>

        <!-- Экран входа и регистрации -->
        <div id="authScreen" class="screen auth-wrapper active">
            <form id="registerForm" class="auth-form active">
                <div class="input-group"><input type="text" id="regNick" placeholder="Ваш Ник" required></div>
                <div class="input-group"><input type="email" id="regEmail" placeholder="Ваша Почта" required></div>
                <div class="input-group">
                    <input type="password" id="regPass" placeholder="Пароль" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('regPass')">👁️</span>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassConfirm" placeholder="Повторите пароль" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('regPassConfirm')">👁️</span>
                </div>
                <button type="submit" class="submit-btn" id="regBtn">Зарегистрироваться</button>
                <div class="auth-switch"><span class="switch-text" onclick="toggleAuth()">Есть аккаунт? Войти</span></div>
            </form>

            <form id="loginForm" class="auth-form">
                <div class="input-group"><input type="text" id="loginNick" placeholder="Ваш Ник" required></div>
                <div class="input-group"><input type="email" id="loginEmail" placeholder="Почта для входа" required></div>
                <div class="input-group">
                    <input type="password" id="loginPass" placeholder="Пароль" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('loginPass')">👁️</span>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Войти</button>
                <div class="auth-switch"><span class="switch-text" onclick="toggleAuth()">Нет аккаунта? Зарегистрироваться</span></div>
            </form>
        </div>

        <!-- ПОЛНОСТЬЮ ПУСТОЙ БЕЛЫЙ ЭКРАН С КНОПКОЙ ПО ЦЕНТРУ -->
        <div id="dashboardScreen">
            <button onclick="logout()" class="logout-btn">Выйти из аккаунта</button>
        </div>
    </div>

    <script>
        // База данных в LocalStorage браузера (Без сервера!)
        let db = JSON.parse(localStorage.getItem('cryptoBankDB')) || { users: [] };
        function saveDB() { localStorage.setItem('cryptoBankDB', JSON.stringify(db)); }

        // Переключение глазика
        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            const eye = input.parentElement.querySelector('.toggle-password');
            if (input.type === 'password') { input.type = 'text'; eye.textContent = '👁️‍🗨️'; } 
            else { input.type = 'password'; eye.textContent = '👁️'; }
        }

        // Красивое уведомление
        function showToast(msg, success = false) {
            const toast = document.getElementById('notificationToast');
            document.getElementById('notifMessage').textContent = msg;
            toast.className = 'notification-toast' + (success ? ' success' : ' error');
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.style.display = 'none', 400); }, 3500);
        }

        // Переключение между входом и регистрацией
        function toggleAuth() {
            const reg = document.getElementById('registerForm');
            const log = document.getElementById('loginForm');
            if (reg.classList.contains('active')) {
                reg.classList.remove('active'); setTimeout(() => log.classList.add('active'), 200);
            } else {
                log.classList.remove('active'); setTimeout(() => reg.classList.add('active'), 200);
            }
        }

        // Переход в белый кабинет (скрываем шапку и вход)
        function showDashboard() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('headerSection').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
        }

        // ===== РЕГИСТРАЦИЯ =====
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.textContent = 'Загрузка...';

            const nick = document.getElementById('regNick').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;

            if (pass !== passConfirm) { showToast('Пароли не совпадают!'); btn.textContent = 'Зарегистрироваться'; return; }
            if (db.users.find(u => u.nick === nick)) { showToast('Этот Ник занят!'); btn.textContent = 'Зарегистрироваться'; return; }
            if (db.users.find(u => u.email === email)) { showToast('Эта почта занята!'); btn.textContent = 'Зарегистрироваться'; return; }

            db.users.push({ nick, email, pass, loginAttempts: 0, blockedUntil: null });
            saveDB();
            localStorage.setItem('cryptoBankSession', email);
            showToast('Регистрация успешна!', true);
            setTimeout(showDashboard, 500);
            btn.textContent = 'Зарегистрироваться';
        });

        // ===== ВХОД =====
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Загрузка...';

            const nick = document.getElementById('loginNick').value;
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const user = db.users.find(u => u.nick === nick && u.email === email);

            if (!user) { showToast('Неверные данные!'); btn.textContent = 'Войти'; return; }
            if (user.blockedUntil && user.blockedUntil > Date.now()) {
                const h = Math.ceil((user.blockedUntil - Date.now()) / (1000 * 60 * 60));
                showToast(`Попытки исчерпаны. Ждите ${h} ч.`); btn.textContent = 'Войти'; return;
            }

            if (user.pass === pass) {
                user.loginAttempts = 0; user.blockedUntil = null; saveDB();
                localStorage.setItem('cryptoBankSession', email);
                showToast('Вход успешен!', true);
                setTimeout(showDashboard, 500);
            } else {
                user.loginAttempts = (user.loginAttempts || 0) + 1;
                if (user.loginAttempts >= 3) {
                    user.blockedUntil = Date.now() + (24 * 60 * 60 * 1000); saveDB();
                    showToast('Попытки исчерпаны. Блок на 24 часа.');
                } else {
                    saveDB();
                    showToast(`Неверный пароль. Осталось ${3 - user.loginAttempts} попыток.`);
                }
            }
            btn.textContent = 'Войти';
        });

        // ===== ПРОВЕРКА СЕССИИ (Автоматический вход при перезагрузке) =====
        const savedEmail = localStorage.getItem('cryptoBankSession');
        if (savedEmail) {
            const user = db.users.find(u => u.email === savedEmail);
            if (user) { showDashboard(); } else { localStorage.removeItem('cryptoBankSession'); }
        }

        // ===== ВЫХОД ИЗ АККАУНТА =====
        function logout() { 
            localStorage.removeItem('cryptoBankSession'); 
            location.reload(); 
        }
    </script>
</body>
</html>
