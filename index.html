<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пустой сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rectangle">
        <div class="square" id="toggleBtn"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('toggleBtn');
            const body = document.body;
            let isAnimating = false;
            let currentTheme = 'dark'; // 'dark' или 'light'

            // Начальные цвета
            const darkBg = '#23271b';
            const lightBg = '#9dac86';
            const darkSquare = '#202419';
            const lightSquare = '#ced5c3';
            const darkBorder = '#202419';
            const lightBorder = '#ffffff';

            // Установка начальной темы (тёмная)
            body.style.backgroundColor = darkBg;
            btn.style.backgroundColor = darkSquare;
            btn.style.left = getLeftPosition('dark');
            currentTheme = 'dark';

            function getLeftPosition(theme) {
                const rect = btn.parentElement;
                const rectWidth = rect.offsetWidth;
                const btnWidth = btn.offsetWidth;
                const padding = parseFloat(getComputedStyle(btn).left) || 8; // берём текущий left или 8
                if (theme === 'dark') {
                    return padding;
                } else {
                    return rectWidth - padding - btnWidth;
                }
            }

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return {r, g, b};
            }

            function interpolateColor(start, end, t) {
                const s = hexToRgb(start);
                const e = hexToRgb(end);
                const r = Math.round(s.r + (e.r - s.r) * t);
                const g = Math.round(s.g + (e.g - s.g) * t);
                const b = Math.round(s.b + (e.b - s.b) * t);
                return `rgb(${r}, ${g}, ${b})`;
            }

            function animateSquare(startLeft, endLeft, startColor, endColor, startBg, endBg, duration) {
                const startTime = performance.now();

                function step(time) {
                    const elapsed = time - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // easeInOut Cubic
                    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                    const currentLeft = startLeft + (endLeft - startLeft) * ease;
                    btn.style.left = currentLeft + 'px';

                    const squareColor = interpolateColor(startColor, endColor, ease);
                    btn.style.backgroundColor = squareColor;

                    const bgColor = interpolateColor(startBg, endBg, ease);
                    body.style.backgroundColor = bgColor;

                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        // Финал
                        btn.style.left = endLeft + 'px';
                        btn.style.backgroundColor = endColor;
                        body.style.backgroundColor = endBg;
                        // Переключаем класс для обводки и других стилей
                        body.classList.toggle('light');
                        currentTheme = body.classList.contains('light') ? 'light' : 'dark';
                        isAnimating = false;
                    }
                }
                requestAnimationFrame(step);
            }

            btn.addEventListener('click', function() {
                if (isAnimating) return;
                isAnimating = true;

                const isLight = body.classList.contains('light');
                const newTheme = isLight ? 'dark' : 'light';

                const rect = btn.parentElement;
                const rectWidth = rect.offsetWidth;
                const btnWidth = btn.offsetWidth;
                const padding = parseFloat(getComputedStyle(btn).left) || 8;

                const startLeft = parseFloat(btn.style.left) || padding;
                const endLeft = newTheme === 'light' ? rectWidth - padding - btnWidth : padding;

                const startSquareColor = isLight ? lightSquare : darkSquare;
                const endSquareColor = isLight ? darkSquare : lightSquare;
                const startBgColor = isLight ? lightBg : darkBg;
                const endBgColor = isLight ? darkBg : lightBg;

                // Длительность: ПК 2с, телефон 3.5с
                const duration = window.innerWidth <= 768 ? 3500 : 2000;

                animateSquare(startLeft, endLeft, startSquareColor, endSquareColor, startBgColor, endBgColor, duration);
            });
        });
    </script>
</body>
</html>
