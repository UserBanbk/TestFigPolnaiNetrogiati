<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .rectangle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 20px;
            background-color: #535e40;
            border-radius: 30px;
            border-top: 5px solid #202419;
        }
        @media (max-width: 600px) {
            .rectangle {
                top: 2px;
                right: 2px;
                width: 245px;
                height: 85px;
                border-radius: 5px;
                border-top: 1px solid #202419;
            }
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#23271b; min-height:100vh;">
    <div class="rectangle"></div>
</body>
</html>
